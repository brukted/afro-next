name: eyecandy
description: "A desktop-first material graph editor foundation."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.9
  collection: ^1.19.1
  multi_split_view: ^3.6.1
  ffi: ^2.2.0
  get_it: ^9.2.1
  logging: ^1.3.0
  path: ^1.9.1
  path_provider: ^2.1.5
  shared_preferences: ^2.5.5
  uuid: ^4.5.3
  vulkan: ^1.3.226
  window_manager: ^0.5.1
  vector_math: ^2.2.0
  json_annotation: ^4.11.0
  flutter_colorpicker: ^1.1.0
  bezier: ^1.2.0
  flutter_svg: ^2.2.4
  file_picker: ^11.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.13.1
  json_serializable: ^6.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/branding/
    - assets/shaders/material/
    - assets/shaders/spirv/material/
