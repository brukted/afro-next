name: eyecandy
description: "A desktop-first material graph editor foundation."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.9
  collection: ^1.19.1
  multi_split_view: ^3.6.1
  ffi: ^2.2.0
  file_selector: ^1.1.0
  get_it: ^9.2.1
  logging: ^1.3.0
  path: ^1.9.1
  path_provider: ^2.1.5
  shared_preferences: ^2.5.5
  uuid: ^4.5.3
  vulkan: ^1.3.226
  window_manager: ^0.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/branding/
